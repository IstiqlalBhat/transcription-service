<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Transcription Service Test</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: system-ui, -apple-system, sans-serif; background: #0a0a0a; color: #e0e0e0; min-height: 100vh; display: flex; justify-content: center; padding: 40px 20px; }
  .container { max-width: 720px; width: 100%; }
  h1 { font-size: 1.5rem; margin-bottom: 8px; color: #fff; }
  .subtitle { color: #888; margin-bottom: 32px; font-size: 0.9rem; }
  .card { background: #141414; border: 1px solid #2a2a2a; border-radius: 12px; padding: 24px; margin-bottom: 16px; }
  .card h2 { font-size: 1rem; margin-bottom: 16px; color: #ccc; }
  label { display: block; font-size: 0.8rem; color: #888; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.05em; }
  input[type="text"] { width: 100%; padding: 10px 12px; background: #1a1a1a; border: 1px solid #333; border-radius: 8px; color: #e0e0e0; font-size: 0.9rem; outline: none; }
  input[type="text"]:focus { border-color: #555; }
  .row { display: flex; gap: 12px; margin-bottom: 16px; }
  .row > div { flex: 1; }
  .btn { padding: 12px 24px; border: none; border-radius: 8px; font-size: 0.9rem; cursor: pointer; font-weight: 500; transition: all 0.15s; }
  .btn-connect { background: #2563eb; color: #fff; }
  .btn-connect:hover { background: #1d4ed8; }
  .btn-disconnect { background: #dc2626; color: #fff; }
  .btn-disconnect:hover { background: #b91c1c; }
  .btn-record { background: #16a34a; color: #fff; width: 100%; padding: 16px; font-size: 1rem; }
  .btn-record:hover { background: #15803d; }
  .btn-record.recording { background: #dc2626; animation: pulse 1.5s infinite; }
  .btn-record.recording:hover { background: #b91c1c; }
  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.7; } }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .status { display: flex; align-items: center; gap: 8px; margin-bottom: 16px; font-size: 0.85rem; }
  .dot { width: 8px; height: 8px; border-radius: 50%; }
  .dot.disconnected { background: #666; }
  .dot.connected { background: #22c55e; }
  .dot.error { background: #ef4444; }
  .transcript-box { background: #0a0a0a; border: 1px solid #2a2a2a; border-radius: 8px; min-height: 200px; max-height: 400px; overflow-y: auto; padding: 16px; font-size: 0.9rem; line-height: 1.6; }
  .transcript-entry { padding: 12px; border-bottom: 1px solid #1a1a1a; }
  .transcript-entry:last-child { border-bottom: none; }
  .transcript-text { color: #fff; margin-bottom: 4px; }
  .transcript-meta { font-size: 0.75rem; color: #666; display: flex; gap: 12px; }
  .confidence-high { color: #22c55e; }
  .confidence-medium { color: #eab308; }
  .confidence-low { color: #ef4444; }
  .model-outputs { margin-top: 8px; }
  .model-output { font-size: 0.75rem; color: #555; padding: 2px 0; }
  .model-output span { color: #888; }
  .toggle-models { font-size: 0.75rem; color: #555; cursor: pointer; text-decoration: underline; margin-top: 4px; }
  .empty-state { color: #444; text-align: center; padding: 60px 20px; }
  .actions { display: flex; gap: 8px; }
</style>
</head>
<body>
<div class="container">
  <h1>Ensemble Transcription Service</h1>
  <p class="subtitle">4 ASR models + Claude judge &mdash; WebSocket test interface</p>

  <div class="card">
    <h2>Connection</h2>
    <div class="row">
      <div>
        <label>Gateway URL</label>
        <input type="text" id="gateway-url" value="wss://transcription-gateway.onrender.com">
      </div>
      <div>
        <label>API Key</label>
        <input type="text" id="api-key" value="test-key-123">
      </div>
    </div>
    <div class="status">
      <div class="dot disconnected" id="status-dot"></div>
      <span id="status-text">Disconnected</span>
    </div>
    <div class="actions">
      <button class="btn btn-connect" id="connect-btn" onclick="toggleConnection()">Connect</button>
    </div>
  </div>

  <div class="card">
    <h2>Record</h2>
    <button class="btn btn-record" id="record-btn" onclick="toggleRecording()" disabled>
      Hold to Record
    </button>
    <p style="text-align: center; color: #555; font-size: 0.75rem; margin-top: 8px;">
      Click to start recording, click again to stop and send
    </p>
  </div>

  <div class="card">
    <h2>Transcriptions</h2>
    <div class="transcript-box" id="transcripts">
      <div class="empty-state">Transcriptions will appear here</div>
    </div>
  </div>
</div>

<script>
let ws = null;
let mediaRecorder = null;
let audioChunks = [];
let isRecording = false;

function setStatus(state, text) {
  const dot = document.getElementById('status-dot');
  const label = document.getElementById('status-text');
  dot.className = 'dot ' + state;
  label.textContent = text;
}

function toggleConnection() {
  if (ws && ws.readyState === WebSocket.OPEN) {
    ws.close();
    return;
  }
  connect();
}

function connect() {
  const url = document.getElementById('gateway-url').value;
  const apiKey = document.getElementById('api-key').value;
  const wsUrl = url + '/ws/transcribe?api_key=' + encodeURIComponent(apiKey);

  setStatus('disconnected', 'Connecting...');
  ws = new WebSocket(wsUrl);

  ws.onopen = () => {
    setStatus('connected', 'Connected');
    document.getElementById('connect-btn').textContent = 'Disconnect';
    document.getElementById('connect-btn').className = 'btn btn-disconnect';
    document.getElementById('record-btn').disabled = false;
  };

  ws.onmessage = (event) => {
    const data = JSON.parse(event.data);
    addTranscript(data);
  };

  ws.onerror = () => {
    setStatus('error', 'Connection error');
  };

  ws.onclose = () => {
    setStatus('disconnected', 'Disconnected');
    document.getElementById('connect-btn').textContent = 'Connect';
    document.getElementById('connect-btn').className = 'btn btn-connect';
    document.getElementById('record-btn').disabled = true;
    ws = null;
  };
}

async function toggleRecording() {
  if (isRecording) {
    stopRecording();
  } else {
    await startRecording();
  }
}

async function startRecording() {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    mediaRecorder = new MediaRecorder(stream, { mimeType: 'audio/webm;codecs=opus' });
    audioChunks = [];

    mediaRecorder.ondataavailable = (e) => {
      if (e.data.size > 0) audioChunks.push(e.data);
    };

    mediaRecorder.onstop = () => {
      const blob = new Blob(audioChunks, { type: 'audio/webm' });
      sendAudio(blob);
      stream.getTracks().forEach(t => t.stop());
    };

    mediaRecorder.start();
    isRecording = true;
    const btn = document.getElementById('record-btn');
    btn.textContent = 'Stop & Send';
    btn.classList.add('recording');
  } catch (err) {
    alert('Microphone access denied: ' + err.message);
  }
}

function stopRecording() {
  if (mediaRecorder && mediaRecorder.state !== 'inactive') {
    mediaRecorder.stop();
  }
  isRecording = false;
  const btn = document.getElementById('record-btn');
  btn.textContent = 'Hold to Record';
  btn.classList.remove('recording');
}

function sendAudio(blob) {
  if (!ws || ws.readyState !== WebSocket.OPEN) return;
  blob.arrayBuffer().then(buffer => {
    ws.send(buffer);
    addPending();
  });
}

let pendingTimer = null;

function addPending() {
  const box = document.getElementById('transcripts');
  if (box.querySelector('.empty-state')) box.innerHTML = '';
  const div = document.createElement('div');
  div.className = 'transcript-entry pending-entry';
  div.innerHTML = '<div class="transcript-text" style="color:#888;">Processing... (4 models + judge) <span class="timer">0s</span></div>';
  box.prepend(div);
  let seconds = 0;
  const timerEl = div.querySelector('.timer');
  pendingTimer = setInterval(() => {
    seconds++;
    timerEl.textContent = seconds + 's';
  }, 1000);
}

function addTranscript(data) {
  const box = document.getElementById('transcripts');

  if (data.error) {
    if (pendingTimer) { clearInterval(pendingTimer); pendingTimer = null; }
    const pending = box.querySelector('.pending-entry');
    if (pending) pending.remove();
    if (box.querySelector('.empty-state')) box.innerHTML = '';
    const div = document.createElement('div');
    div.className = 'transcript-entry';
    div.innerHTML = '<div class="transcript-text" style="color:#ef4444;">Error: ' + data.error + '</div>';
    box.prepend(div);
    return;
  }

  const phase = data.phase || 'fast';
  const models = data.model_outputs || {};
  const time = new Date().toLocaleTimeString();

  if (phase === 'fast') {
    // Phase 1: instant result from Parakeet
    if (pendingTimer) { clearInterval(pendingTimer); pendingTimer = null; }
    const pending = box.querySelector('.pending-entry');
    if (pending) pending.remove();
    if (box.querySelector('.empty-state')) box.innerHTML = '';

    const div = document.createElement('div');
    div.className = 'transcript-entry fast-entry';
    div.setAttribute('data-time', time);
    div.innerHTML = `
      <div class="transcript-text">${data.transcription}</div>
      <div class="transcript-meta">
        <span style="color:#3b82f6;">instant (Parakeet)</span>
        <span>${time}</span>
        <span style="color:#888; font-style:italic;">judging...</span>
      </div>
    `;
    box.prepend(div);
  } else if (phase === 'judged') {
    // Phase 2: replace with judged result
    const conf = data.confidence || 'medium';
    const fastEntry = box.querySelector('.fast-entry');

    let modelsHtml = '';
    for (const [name, text] of Object.entries(models)) {
      const display = text || '(failed)';
      modelsHtml += '<div class="model-output"><span>' + name + ':</span> ' + display + '</div>';
    }

    const html = `
      <div class="transcript-text">${data.transcription}</div>
      <div class="transcript-meta">
        <span class="confidence-${conf}">${conf} confidence</span>
        <span>${time}</span>
        <span style="color:#22c55e;">judged</span>
      </div>
      <div class="toggle-models" onclick="this.nextElementSibling.style.display = this.nextElementSibling.style.display === 'none' ? 'block' : 'none'">show model outputs</div>
      <div class="model-outputs" style="display:none">${modelsHtml}</div>
    `;

    if (fastEntry) {
      fastEntry.className = 'transcript-entry';
      fastEntry.innerHTML = html;
    } else {
      if (box.querySelector('.empty-state')) box.innerHTML = '';
      const div = document.createElement('div');
      div.className = 'transcript-entry';
      div.innerHTML = html;
      box.prepend(div);
    }
  }
}
</script>
</body>
</html>
